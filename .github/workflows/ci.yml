name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax
        run: |
          set -e
          find . -name '*.php' -not -path './.git/*' -print0 | while IFS= read -r -d '' f; do
            php -l "$f"
          done

      - name: Widget JS syntax
        run: node --check widget/widget.js

      - name: Widget language files are valid JSON with identical structure
        run: php .github/scripts/check-lang.php

      - name: Configurator translations have identical keys
        run: php .github/scripts/check-translations.php
